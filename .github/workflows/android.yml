name: Android

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install mobile Web dependencies
        run: npm ci

      - name: Verify mobile Web
        run: npm run typecheck && npm run lint && npm run test:mobile-web-state

      - name: Verify Android client
        working-directory: clients/android
        run: ./gradlew testDebugUnitTest lintDebug assembleDebug
