name: Android

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Verify Android project and protocol contract
        working-directory: android
        run: ./gradlew testDebugUnitTest lintDebug assembleDebug

  runtime-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mobile consumer
        uses: actions/checkout@v6

      - name: Verify lock and fetch exact core revision
        shell: bash
        run: |
          set -euo pipefail
          python3 runtime-gate/verify_contract.py --mobile-root .
          core_repository="$(python3 runtime-gate/verify_contract.py --mobile-root . --print-field source_repository)"
          core_commit="$(python3 runtime-gate/verify_contract.py --mobile-root . --print-field source_commit)"
          protocol_commit="$(python3 runtime-gate/verify_contract.py --mobile-root . --print-field protocol_source_commit)"
          core_root="${RUNNER_TEMP}/akashic-agent"
          git init "${core_root}"
          git -C "${core_root}" remote add origin "${core_repository}"
          git -C "${core_root}" fetch --depth=1 origin "${core_commit}"
          git -C "${core_root}" fetch --depth=1 origin "${protocol_commit}"
          git -C "${core_root}" checkout --detach "${core_commit}"
          python3 runtime-gate/verify_contract.py --mobile-root . --core-root "${core_root}"

      - name: Build pinned core Gate image
        shell: bash
        run: |
          set -euo pipefail
          core_commit="$(python3 runtime-gate/verify_contract.py --mobile-root . --print-field source_commit)"
          core_root="${RUNNER_TEMP}/akashic-agent"
          docker build \
            --file "${core_root}/docker/debug/Dockerfile" \
            --tag "akashic-mobile-runtime-gate:${core_commit}" \
            "${core_root}"

      - name: Run core semantics in an isolated workspace
        shell: bash
        run: |
          set -euo pipefail
          core_commit="$(python3 runtime-gate/verify_contract.py --mobile-root . --print-field source_commit)"
          python3 runtime-gate/run_core_contract.py \
            --mobile-root . \
            --core-root "${RUNNER_TEMP}/akashic-agent" \
            --image "akashic-mobile-runtime-gate:${core_commit}"
